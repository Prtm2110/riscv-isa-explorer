site_name: RISC-V Instruction Set Explorer
site_url: https://prtm2110.github.io/riscv-isa-explorer/
repo_url: https://github.com/Prtm2110/riscv-isa-explorer
repo_name: Prtm2110/riscv-isa-explorer
edit_uri: edit/master/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.action.edit
    - content.action.view
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - Usage: usage.md
  - Design: design.md
  - Results: results.md

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true

extra_css:
  - assets/stylesheets/extra.css
